<!doctype html>
<html lang="en" data-bs-theme="light">
    <head>
        <title>Image Compressor</title>
        <!-- Required meta tags -->
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <!-- Bootstrap CSS v5.3.8 -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous"
        />
        <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    </head>

    <body>
        <header>
             <nav class="navbar navbar-expand-lg navbar-dark custom-navbar">
                <div class="container-fluid">
                    <a class="navbar-brand" href="{{ url_for('home') }}">Pixel & PDF</a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'home' %}active{% endif %}" 
                            aria-current="page" href="{{ url_for('home') }}">Home</a>
                        </li>
                        <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'imageconvertor' %}active{% endif %}" 
                            href="{{ url_for('imageconvertor') }}">Image Convertor</a>
                        </li>
                        <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'pdf_merger' %}active{% endif %}" 
                            href="{{ url_for('pdf_merger') }}">Pdf Merger</a>
                        </li>
                         <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'imagecompressor' %}active{% endif %}" 
                            href="{{ url_for('imagecompressor') }}">Image Compressor</a>
                        </li>
                    </ul>
                    </div>
                </div>
            </nav>
        </header>
        <main>
            <form action="{{ url_for('imagecompressor') }}" method="post" enctype="multipart/form-data">
                <div class="d-flex justify-content-center align-items-center flex-column" style="min-height: calc(100vh - 56px);">

                    <div class="mb-3 text-center custom-box p-3" style="border-radius: 5px; color:white">
                        <label for="formFile" class="form-label">Input Image</label>
                        <input
                            class="form-control"
                            type="file"
                            id="formFile"
                            name="image"
                            accept="image/png,image/jpeg,image/webp,image/bmp,image/gif"
                            required>
                        <button class="btn btn-success mt-3" type="submit">
                            Submit
                        </button>
                    </div>

                   

    </div>
</form>
        </main>
        <footer>
            <!-- place footer here -->
        </footer>
        <!-- Bootstrap JavaScript Bundle (includes Popper) -->
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"
        ></script>
    </body>
</html>
